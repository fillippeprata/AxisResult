name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Build, test and coverage gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore AxisResult.slnx

      - name: Build
        run: dotnet build AxisResult.slnx -c Release --no-restore

      - name: Test with coverage
        run: >
          dotnet test src/AxisResult.UnitTests/AxisResult.UnitTests.csproj
          -c Release
          --no-build
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults
          --
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Coverage gate (100% line + branch)
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: TestResults/**/coverage.cobertura.xml
          badge: false
          fail_below_min: true
          format: text
          hide_branch_rate: false
          hide_complexity: true
          thresholds: '100 100'

      - name: Upload coverage report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: TestResults/**/coverage.cobertura.xml
          retention-days: 14
